name: Build & Release

# Build installers for Windows, Linux, and macOS. Tag pushes (v*) also publish a Release.
on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build: npm run dist:win
            artifact: aura-os-windows
          - os: ubuntu-latest
            build: npm run dist:linux
            artifact: aura-os-linux
          - os: macos-latest
            build: npx electron-builder --mac --publish never
            artifact: aura-os-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build installers
        run: ${{ matrix.build }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.dmg
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: ignore

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.dmg
            dist/*.yml
            dist/*.blockmap
          fail_on_unmatched_files: false
